# This is a Databricks asset bundle definition for energy_endava_193.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: energy_endava_193
  uuid: 01da7a0f-c137-4a36-911c-255ae4361a8c

include:
  - resources/*.yml
  - resources/*/*.yml

sync:
  include:
    - src/**/*
    - src/**/.*

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  target_catalog:
    default: "energy_endava_193"
    description: The target catalog for ingestion job, created 263
  target_schema:
    default: "default"
    description: The target schema for ingestion job, created 263

resources:
  jobs:
    ingest_bronze_job:
      name: ingest_bronze_job
      tasks:
        - task_key: ingest_bronze_task
          notebook_task:
            notebook_path: ./src/energy_endava_193_etl/transformations/01_ingest_bronze
            base_parameters:
              catalog: "${var.target_catalog}"
              schema: "${var.target_schema}"

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-35a677b6-29c1.cloud.databricks.com
    variables:
      catalog: energy-endava-193
      schema: default
  prod:
    mode: production
    workspace:
      host: https://dbc-35a677b6-29c1.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/quangthanhdong04.au@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Users/quangthanhdong04.au@gmail.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: workspace
      schema: prod
    permissions:
      - user_name: quangthanhdong04.au@gmail.com
        level: CAN_MANAGE
        
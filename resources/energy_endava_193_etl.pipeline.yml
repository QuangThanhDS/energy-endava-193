# The main pipeline for energy_endava_193

resources:
  pipelines:
    energy_endava_193_etl:
      name: energy_endava_193_etl
      catalog: ${var.catalog}
      schema: ${var.schema}
      serverless: true
      root_path: "../src/energy_endava_193_etl"

      libraries:
        - glob:
            include: ../src/energy_endava_193_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
